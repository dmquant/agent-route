services:
  # ─── PostgreSQL ───────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: ai_institute_pg
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ai_institute}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ai_institute_dev}
      POSTGRES_DB: ${POSTGRES_DB:-ai_institute}
    volumes:
      - .docker-data/postgres:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ai_institute} -d ${POSTGRES_DB:-ai_institute}"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ─── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ai_institute_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD:-ai_institute_dev}
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
        --appendonly yes
        --appendfsync everysec
    volumes:
      - .docker-data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-ai_institute_dev}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ─── Kafka (KRaft mode — no Zookeeper) ───────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: ai_institute_kafka
    restart: unless-stopped
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    environment:
      # KRaft settings
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"

      # Listeners
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:${KAFKA_PORT:-9092}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      # Broker settings
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      # Topic defaults
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1

      # Retention
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_RETENTION_BYTES: 1073741824
      KAFKA_LOG_SEGMENT_BYTES: 536870912

      # Misc
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - .docker-data/kafka:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 15

  # ─── Data Connector Service ──────────────────────────────────
  data_connector:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai_institute_data_connector
    restart: unless-stopped
    ports:
      - "8001:8000"
    environment:
      - APP_NAME=wind-connector
      - APP_PORT=8000
      - LOG_LEVEL=INFO
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - WIND_USERNAME=${WIND_USERNAME}
      - WIND_PASSWORD=${WIND_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn services.data_connector.main:app --host 0.0.0.0 --port 8000

  # ─── Scheduler Service ───────────────────────────────────────
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai_institute_scheduler
    restart: unless-stopped
    ports:
      - "8002:8000"
    environment:
      - APP_NAME=data-scheduler
      - APP_PORT=8000
      - LOG_LEVEL=INFO
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn services.scheduler.main:app --host 0.0.0.0 --port 8000

  # ─── East Money Scraper Service ─────────────────────────────
  eastmoney_scraper:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai_institute_eastmoney_scraper
    restart: unless-stopped
    environment:
      - APP_NAME=eastmoney-scraper
      - LOG_LEVEL=INFO
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python services/data_connector/eastmoney_main.py
