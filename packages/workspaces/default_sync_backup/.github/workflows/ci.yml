name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_DEFAULT: "3.11"

jobs:
  # ── Lint (ruff + mypy) ─────────────────────────────────────────
  lint:
    name: Lint (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Ruff check
        run: uv run ruff check services/ libs/ configs/ tests/

      - name: Ruff format check
        run: uv run ruff format --check services/ libs/ configs/ tests/

      - name: Mypy
        run: uv run mypy services/ libs/ configs/

  # ── Unit tests (no external services) ──────────────────────────
  test-unit:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run unit tests with coverage
        run: |
          uv run pytest tests/unit -v --tb=short \
            --cov=services --cov=libs --cov=configs \
            --cov-report=xml:coverage-unit.xml \
            --cov-report=term-missing \
            --cov-fail-under=80

      - name: Upload unit coverage artifact
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: coverage-unit.xml

  # ── Integration tests (with service containers) ────────────────
  # Only run on push to main (full pipeline)
  test-integration:
    name: Integration Tests (Python ${{ matrix.python-version }})
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: ai_institute
          POSTGRES_PASSWORD: ai_institute_test
          POSTGRES_DB: ai_institute_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ai_institute -d ai_institute_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      APP_ENV: test
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_USER: ai_institute
      POSTGRES_PASSWORD: ai_institute_test
      POSTGRES_DB: ai_institute_test
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run database migrations
        run: uv run alembic upgrade head

      - name: Run integration tests with coverage
        run: |
          uv run pytest tests/integration -v --tb=short \
            --cov=services --cov=libs --cov=configs \
            --cov-report=xml:coverage-integration.xml \
            --cov-report=term-missing

      - name: Upload integration coverage artifact
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-integration
          path: coverage-integration.xml

  # ── Build validation ───────────────────────────────────────────
  build:
    name: Build Validation
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose config
        run: docker compose config --quiet

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_DEFAULT }}

      - name: Verify dependency resolution
        run: uv sync --all-extras --dry-run

      - name: Verify package builds
        run: uv build

  # ── Coverage upload ────────────────────────────────────────────
  coverage:
    name: Upload Coverage
    needs: [test-unit, test-integration]
    if: always() && needs.test-unit.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download coverage artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          merge-multiple: true

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage-unit.xml,coverage-integration.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
