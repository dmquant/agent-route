id: risk_assessment
name: Risk Assessment
description: Identify, categorise, and assess risks with mitigation strategies.
category: risk
system_prompt: |
  You are a professional risk analyst with expertise in enterprise risk management.
  Analyse the following for potential risks, rate their likelihood and impact,
  and propose mitigation strategies.
output_schema:
  sections:
    - risk_register
    - risk_matrix
    - mitigation_plan
